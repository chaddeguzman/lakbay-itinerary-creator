    .trip-workspace{grid-template-columns:auto minmax(0,1fr)}.section-nav{width:190px}

    .theme-toggle{position:fixed;top:14px;right:16px;z-index:10;width:42px;height:42px;display:grid;place-items:center;border:1px solid var(--line);border-radius:50%;background:var(--paper2);color:var(--teal);box-shadow:0 4px 16px #0002;font-size:1.25rem;transition:background .2s,color .2s,transform .2s}.theme-toggle:hover{transform:translateY(-1px)}html[data-theme="dark"]{color-scheme:dark;--paper:#14201f;--paper2:#1c2b29;--ink:#ecdfc8;--teal:#79c5bb;--terra:#e18a6e;--gold:#dfb66e;--muted:#b2b9b1;--line:#40514d;--shadow:0 12px 35px #0005}html[data-theme="dark"] body{background-image:linear-gradient(30deg,#79c5bb0a 12%,transparent 12.5%,transparent 87%,#79c5bb0a 87.5%),linear-gradient(150deg,#79c5bb0a 12%,transparent 12.5%,transparent 87%,#79c5bb0a 87.5%)}html[data-theme="dark"] .sidebar,html[data-theme="dark"] .section-nav{background:#0d3532}html[data-theme="dark"] .field input,html[data-theme="dark"] .field select,html[data-theme="dark"] .field textarea,html[data-theme="dark"] .form-field input,html[data-theme="dark"] .form-field textarea{background:#14201f;color:var(--ink)}html[data-theme="dark"] .stop-time{background:#293b37}html[data-theme="dark"] .day-title{color:var(--ink)}
    .theme-toggle{left:202px;right:auto;top:18px;width:82px;height:34px;border-radius:999px;font:700 .78rem Arial,sans-serif;letter-spacing:.02em;white-space:nowrap;background:#ffffff14;color:#fff;border-color:#ffffff55;box-shadow:none}.theme-toggle:hover{background:#ffffff24}html[data-theme="dark"] .theme-toggle{background:#ecdfc818;color:#fff;border-color:#ecdfc866}html[data-theme="dark"] .trip-card.active{background:#29413d;color:#f8ecd6;border-color:#66827b}html[data-theme="dark"] .section-tab:hover,html[data-theme="dark"] .section-tab.active{background:#29413d;color:#b9f0e8}html[data-theme="dark"] .btn{color:#102421;font-weight:700}html[data-theme="dark"] .btn.secondary{color:#a5e4da;border-color:#79c5bb}html[data-theme="dark"] .sidebar .btn.secondary{color:#fff;border-color:#ffffff88}html[data-theme="dark"] .btn.danger{color:#ffad98;border-color:#d97b65}html[data-theme="dark"] .empty,html[data-theme="dark"] .day,html[data-theme="dark"] .record-card,html[data-theme="dark"] .expense-day,html[data-theme="dark"] .packing-item,html[data-theme="dark"] .budget-card{color:#f1e7d5}html[data-theme="dark"] input::placeholder,html[data-theme="dark"] textarea::placeholder{color:#899792;opacity:1}@media(max-width:900px){.theme-toggle{left:auto;right:14px;top:14px;background:var(--paper2);color:var(--teal);border-color:var(--line);box-shadow:0 4px 16px #0002}html[data-theme="dark"] .theme-toggle{background:#1c2b29;color:#b9f0e8;border-color:#66827b}}

<body>
  <button class="mobile-menu no-print" aria-label="Open trip menu">☰</button>
  <button class="theme-toggle no-print" id="themeToggle" type="button" aria-label="Switch to dark theme" title="Switch to dark theme"><span aria-hidden="true">☾ Dark</span></button>
  <div class="app"><aside class="sidebar no-print"><h1 class="brand">LAKBAY <span>✦</span></h1><p class="tagline">Journeys, thoughtfully mapped.</p><input class="search" id="tripSearch" placeholder="Search trips…" aria-label="Search trips"><div class="trip-list" id="tripList"></div><div class="side-actions"><button class="btn" id="newTrip">＋ New trip</button><button class="btn secondary" id="downloadBackup">Download backup</button><button class="btn secondary" id="importBackup">Import backup</button><input type="file" id="backupFile" accept="application/json,.json" hidden></div></aside><main class="main" id="main"></main></div>
  <dialog class="modal" id="tripModal"><form method="dialog" class="modal-body" id="tripForm"><h2 id="modalTitle">Create a journey</h2><input type="hidden" id="editTripId"><div class="form-field"><label for="tripName">Trip name <span class="required">*</span></label><input id="tripName" required placeholder="Summer in Palawan"></div><div class="form-field"><label for="tripDestination">Destination <span class="required">*</span></label><input id="tripDestination" required placeholder="El Nido, Palawan"></div><div class="form-field"><label for="tripDescription">Description <span class="optional">(optional)</span></label><textarea id="tripDescription" rows="3" placeholder="What is this journey about?"></textarea></div><div class="form-row"><div class="form-field"><label for="tripStart">Start date <span class="required">*</span></label><input id="tripStart" type="date" required></div><div class="form-field"><label for="tripEnd">End date <span class="required">*</span></label><input id="tripEnd" type="date" required></div></div><div class="modal-actions"><button class="btn secondary" type="button" id="cancelTrip">Cancel</button><button class="btn" type="submit" id="saveTrip">Save trip</button></div></form></dialog>
  <div class="toast" id="toast" role="status"></div>
  <script>
  (()=>{'use strict';
    const KEY='itineraryApp:v1', CATEGORIES=['food','transport','activities','lodging'], DEFAULT_PACK=['Passport / valid ID','Phone and chargers','Medication','Travel documents'];
    function normalizeTrip(t){t.days=Array.isArray(t.days)?t.days:[];t.days.forEach(d=>{d.stops=Array.isArray(d.stops)?d.stops:[];d.expenses=Array.isArray(d.expenses)?d.expenses:[]});t.packingList=Array.isArray(t.packingList)?t.packingList:[];t.flights=Array.isArray(t.flights)?t.flights:[];t.hotels=Array.isArray(t.hotels)?t.hotels:[];t.foodPlaces=Array.isArray(t.foodPlaces)?t.foodPlaces:[];return t}
    function normalizeState(x){const s=x&&Array.isArray(x.trips)?x:{trips:[],activeTripId:null};s.trips.forEach(normalizeTrip);s.ui=s.ui||{};s.ui.navCollapsed=!!s.ui.navCollapsed;s.ui.theme=s.ui.theme==='dark'?'dark':'light';return s}
    const Storage={read(){try{return normalizeState(JSON.parse(localStorage.getItem(KEY)))}catch{return normalizeState(null)}},write(s){localStorage.setItem(KEY,JSON.stringify(normalizeState(s)))},all(){return this.read().trips},active(){const s=this.read();return s.trips.find(t=>t.id===s.activeTripId)||s.trips[0]||null},setActive(id){const s=this.read();s.activeTripId=id;this.write(s)},mutate(fn){const s=this.read();fn(s);this.write(s)}};
    const $=s=>document.querySelector(s), esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot',"'":'&#39;'}[c])), uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7), parseDate=s=>{const [y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)}, localIso=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`, today=()=>localIso(new Date()), fmt=d=>d?parseDate(d).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}):'', money=n=>Number(n||0).toLocaleString(undefined,{maximumFractionDigits:2});
    function calendarDates(start,end){const dates=[];for(let d=parseDate(start),last=parseDate(end);d<=last&&dates.length<366;d.setDate(d.getDate()+1))dates.push(localIso(d));return dates}
    function syncTripDates(t,start,end){const dates=calendarDates(start,end),existing=new Map((t.days||[]).map(d=>[d.date,d]));t.startDate=start;t.endDate=end;t.days=dates.map((date,i)=>existing.get(date)||{id:uid(),date,title:i===0?'Flight Day / Arrival':i===dates.length-1?'Return Flight':'Explore',stops:[],expenses:[]});if(t.days.length===1&&!existing.has(dates[0]))t.days[0].title='Flight Day / Return';normalizeTrip(t);t.flights.forEach(r=>syncRecordExpense(t,'flight',r));t.hotels.forEach(r=>syncRecordExpense(t,'hotel',r));t.foodPlaces.forEach(r=>syncRecordExpense(t,'food',r))}
    let tab='itinerary'; const main=$('#main'), list=$('#tripList'), HOUSE_ICON='<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11.2 12 4l9 7.2v8.3a.5.5 0 0 1-.5.5H15v-6H9v6H3.5a.5.5 0 0 1-.5-.5z" fill="currentColor"/></svg>', CHART_ICON='<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19V5M4 19h17M7 15l4-4 3 2 5-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>', NAV_ITEMS=[['itinerary','🗺','Itinerary'],['flight','✈','Flight'],['hotel',HOUSE_ICON,'Hotel'],['food','🍽','Food'],['expenses',CHART_ICON,'Expenses'],['packing','✓','Packing list']];
    function toast(msg){const el=$('#toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800)}
    function applyTheme(theme){const dark=theme==='dark',button=$('#themeToggle');document.documentElement.dataset.theme=dark?'dark':'light';button.querySelector('span').textContent=dark?'☀ Light':'☾ Dark';button.setAttribute('aria-label',dark?'Switch to light theme':'Switch to dark theme');button.title=button.getAttribute('aria-label')}
    applyTheme(Storage.read().ui.theme);$('#themeToggle').addEventListener('click',()=>{let theme;Storage.mutate(s=>{s.ui.theme=s.ui.theme==='dark'?'light':'dark';theme=s.ui.theme});applyTheme(theme)});
    function blankStop(){return{id:uid(),time:'09:00',activity:'',location:'',mapsLink:'',cost:'',currency:'PHP',category:'activities',notes:''}}
    function render(){renderTrips();const t=Storage.active();if(!t){main.innerHTML='<section class="empty"><div class="stamp" style="margin:auto">LAKBAY</div><h2>Begin a new journey</h2><p>Create your first trip, then shape each day one stop at a time.</p><button class="btn" data-action="new">Create a trip</button></section>';return}const collapsed=Storage.read().ui.navCollapsed;main.innerHTML=`<header class="trip-head"><div><div class="eyebrow">Travel itinerary</div><h1 class="trip-title">${esc(t.name)}</h1><div class="destination">⌖ ${esc(t.destination)} &nbsp; · &nbsp; ${fmt(t.startDate)} – ${fmt(t.endDate)}</div></div><div class="toolbar no-print"><button class="btn small secondary" data-action="rename">Edit trip</button><button class="btn small secondary" data-action="duplicate">Duplicate</button><button class="btn small secondary" data-action="png">Export PNG</button><button class="btn small secondary" onclick="window.print()">Print / PDF</button><button class="btn small danger" data-action="delete-trip">Delete</button></div></header><div class="trip-workspace"><nav class="section-nav no-print ${collapsed?'collapsed':''}" aria-label="Trip sections"><button class="section-nav-toggle" data-action="toggle-nav" aria-expanded="${!collapsed}" title="${collapsed?'Expand':'Collapse'} sections">${collapsed?'☰':'← Collapse'}</button>${NAV_ITEMS.map(([id,icon,label])=>`<button class="section-tab ${tab===id?'active':''}" data-tab="${id}" title="${label}" aria-label="${label}"><span class="section-icon" aria-hidden="true">${icon}</span><span class="section-label">${label}</span></button>`).join('')}</nav><div class="section-content">${itineraryPanel(t)}${flightPanel(t)}${hotelPanel(t)}${foodPanel(t)}${expensesPanel(t)}${packingPanel(t)}</div></div>`}
    function renderTrips(){const q=$('#tripSearch').value.toLowerCase(),s=Storage.read();list.innerHTML=s.trips.filter(t=>(t.name+' '+t.destination).toLowerCase().includes(q)).map(t=>`<button class="trip-card ${t.id===s.activeTripId?'active':''}" data-trip="${t.id}"><strong>${esc(t.name)}</strong><small>${esc(t.destination)} · ${fmt(t.startDate)}</small></button>`).join('')||'<small>No matching journeys.</small>'}
    function itineraryPanel(t){return `<section class="panel ${tab==='itinerary'?'active':''}" data-panel="itinerary">${t.description?`<p class="trip-description">${esc(t.description)}</p>`:''}${t.days.map((d,i)=>dayHtml(d,i)).join('')}<button class="btn no-print" data-action="add-day">＋ Add day</button></section>`}
    function mapsUrl(location){return location?'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(location):''}
    function syncStatus(t,date,amount){if(!Number(amount))return 'Add an amount to sync this record to Expenses.';if(!date)return 'Choose an event date to sync this cost to Expenses.';return t.days.some(d=>d.date===date)?'Synced to Expenses.':'Event date must fall within this trip to sync the expense.'}
    function recordField(label,field,value,type='text',extra=''){return `<div class="field ${extra}"><label>${label}</label><input type="${type}" data-record-field="${field}" value="${esc(value)}" ${type==='number'?'min="0" step="0.01"':''}></div>`}
    function flightPanel(t){return `<section class="panel ${tab==='flight'?'active':''}" data-panel="flight"><h2>Flights</h2><p>Keep flight segments and booking details together.</p>${t.flights.map((r,i)=>{const date=(r.departure||'').slice(0,10),status=syncStatus(t,date,r.amount);return `<article class="record-card" data-record-type="flight" data-record="${r.id}"><header class="record-head"><h3>Flight ${i+1}</h3><button class="btn small danger no-print" data-action="remove-record">×</button></header><div class="record-grid">${recordField('Airline','airline',r.airline)}${recordField('Flight number','flightNumber',r.flightNumber)}${recordField('Origin','origin',r.origin)}${recordField('Destination','destination',r.destination)}${recordField('Departure','departure',r.departure,'datetime-local','wide')}${recordField('Arrival','arrival',r.arrival,'datetime-local','wide')}${recordField('Booking reference','bookingRef',r.bookingRef)}${recordField('Amount','amount',r.amount,'number')}${recordField('Currency','currency',r.currency||'PHP')}<div class="field full"><label>Notes</label><textarea data-record-field="notes">${esc(r.notes)}</textarea></div></div><small class="sync-note ${Number(r.amount)&&(!date||!t.days.some(d=>d.date===date))?'warning':''}">${status}</small></article>`}).join('')||'<p class="expense-empty">No flights added yet.</p>'}<button class="btn no-print" data-action="add-record" data-record-type="flight">＋ Add flight</button></section>`}
    function hotelPanel(t){return `<section class="panel ${tab==='hotel'?'active':''}" data-panel="hotel"><h2>Hotels</h2><p>Track stays, confirmations, and lodging costs.</p>${t.hotels.map((r,i)=>{const status=syncStatus(t,r.checkIn,r.amount),map=mapsUrl(r.location);return `<article class="record-card" data-record-type="hotel" data-record="${r.id}"><header class="record-head"><h3>Stay ${i+1}</h3><button class="btn small danger no-print" data-action="remove-record">×</button></header><div class="record-grid">${recordField('Property name','name',r.name,'text','wide')}${recordField('Location','location',r.location,'text','wide')}${recordField('Check-in','checkIn',r.checkIn,'date')}${recordField('Check-out','checkOut',r.checkOut,'date')}${recordField('Confirmation number','confirmation',r.confirmation)}${recordField('Amount','amount',r.amount,'number')}${recordField('Currency','currency',r.currency||'PHP')}<div class="field full"><label>Notes</label><textarea data-record-field="notes">${esc(r.notes)}</textarea></div></div>${map?`<a class="map-link" target="_blank" rel="noopener" href="${map}">Open in Google Maps ↗</a>`:''}<small class="sync-note ${Number(r.amount)&&(!r.checkIn||!t.days.some(d=>d.date===r.checkIn))?'warning':''}">${status}</small></article>`}).join('')||'<p class="expense-empty">No hotels added yet.</p>'}<button class="btn no-print" data-action="add-record" data-record-type="hotel">＋ Add hotel</button></section>`}
    function foodPanel(t){return `<section class="panel ${tab==='food'?'active':''}" data-panel="food"><h2>Food shortlist</h2><p>Save restaurants to try; add a visit date when you want a cost logged to Expenses.</p>${t.foodPlaces.map((r,i)=>{const status=syncStatus(t,r.visitDate,r.amount),map=mapsUrl(r.location);return `<article class="record-card" data-record-type="food" data-record="${r.id}"><header class="record-head"><h3>Place ${i+1}</h3><button class="btn small danger no-print" data-action="remove-record">×</button></header><div class="record-grid">${recordField('Venue','venue',r.venue,'text','wide')}${recordField('Cuisine','cuisine',r.cuisine)}${recordField('Meal type','mealType',r.mealType)}${recordField('Location','location',r.location,'text','wide')}${recordField('Planned visit','visitDate',r.visitDate,'date')}${recordField('Reservation time','reservationTime',r.reservationTime,'time')}${recordField('Reservation details','reservation',r.reservation,'text','wide')}${recordField('Amount','amount',r.amount,'number')}${recordField('Currency','currency',r.currency||'PHP')}<div class="field full"><label>Notes</label><textarea data-record-field="notes">${esc(r.notes)}</textarea></div></div>${map?`<a class="map-link" target="_blank" rel="noopener" href="${map}">Open in Google Maps ↗</a>`:''}<small class="sync-note ${Number(r.amount)&&(!r.visitDate||!t.days.some(d=>d.date===r.visitDate))?'warning':''}">${status}</small></article>`}).join('')||'<p class="expense-empty">No food places saved yet.</p>'}<button class="btn no-print" data-action="add-record" data-record-type="food">＋ Add food place</button></section>`}
    function recordCollection(t,type){return type==='flight'?t.flights:type==='hotel'?t.hotels:t.foodPlaces}
    function recordExpenseMeta(type,r){return type==='flight'?{date:(r.departure||'').slice(0,10),description:`Flight ${r.airline||''} ${r.flightNumber||''}`.trim(),category:'transport'}:type==='hotel'?{date:r.checkIn,description:`Hotel: ${r.name||r.location||'Stay'}`,category:'lodging'}:{date:r.visitDate,description:`Food: ${r.venue||'Dining'}`,category:'food'}}
    function syncRecordExpense(t,type,r){let linked=null;t.days.forEach(d=>{d.expenses=d.expenses||[];const found=d.expenses.find(x=>x.sourceType===type&&x.sourceId===r.id);if(found)linked=found;d.expenses=d.expenses.filter(x=>!(x.sourceType===type&&x.sourceId===r.id))});const meta=recordExpenseMeta(type,r),day=t.days.find(d=>d.date===meta.date);if(Number(r.amount)&&day)day.expenses.push({id:linked?.id||uid(),description:meta.description,category:meta.category,amount:r.amount,currency:r.currency||'PHP',sourceType:type,sourceId:r.id})}
    function totals(stops){const o={};stops.forEach(s=>{if(Number(s.cost))o[s.currency||'PHP']=(o[s.currency||'PHP']||0)+Number(s.cost)});return Object.entries(o).map(([c,n])=>`${c} ${money(n)}`).join(' · ')||'No expenses yet'}
    function dayHtml(d,i){return `<article class="day" data-day="${d.id}"><header class="day-head"><div class="stamp">Day<br>${i}</div><div><input class="day-title" data-field="title" value="${esc(d.title)}" aria-label="Day title"><small>${fmt(d.date)}</small></div><div class="icon-actions no-print"><button class="btn small secondary" data-action="day-up" title="Move up">↑</button><button class="btn small secondary" data-action="day-down" title="Move down">↓</button><button class="btn small danger" data-action="remove-day" title="Remove day">×</button></div></header>${d.stops.map((s,j)=>stopHtml(s,j)).join('')}<footer class="day-foot"><button class="btn small no-print" data-action="add-stop">＋ Add stop</button><span class="total">${totals(d.stops)}</span></footer></article>`}
    function stopHtml(s,j){const map=s.location?'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(s.location):'';return `<div class="stop" data-stop="${s.id}"><div><label class="eyebrow">Stop ${j+1}</label><input class="stop-time" type="time" data-field="time" value="${esc(s.time)}"></div><div class="fields"><div class="field"><label>Activity</label><input data-field="activity" value="${esc(s.activity)}" placeholder="Island hopping"></div><div class="field"><label>Location</label><input data-field="location" value="${esc(s.location)}" placeholder="Place or address">${map?`<a class="map-link" target="_blank" rel="noopener" href="${map}">Open in Google Maps ↗</a>`:''}</div><div class="field"><label>Cost</label><input type="number" min="0" step="0.01" data-field="cost" value="${esc(s.cost)}" placeholder="0"></div><div class="field"><label>Currency</label><input data-field="currency" value="${esc(s.currency)}" maxlength="5"></div><div class="field"><label>Category</label><select data-field="category">${CATEGORIES.map(c=>`<option ${s.category===c?'selected':''}>${c}</option>`).join('')}</select></div><div class="field notes"><label>Notes</label><textarea data-field="notes" placeholder="Reservation details, reminders…">${esc(s.notes)}</textarea></div></div><div class="icon-actions no-print"><button class="btn small secondary" data-action="stop-up" title="Move up">↑</button><button class="btn small secondary" data-action="stop-down" title="Move down">↓</button><button class="btn small danger" data-action="remove-stop" title="Remove stop">×</button></div></div>`}
    function expensesPanel(t){const all=t.days.flatMap(d=>d.expenses||[]),byCur={};all.forEach(x=>{if(Number(x.amount))byCur[x.currency||'PHP']=(byCur[x.currency||'PHP']||0)+Number(x.amount)});return `<section class="panel ${tab==='expenses'?'active':''}" data-panel="expenses"><h2>Expenses</h2><p>Log purchases against the day they happened. Trip totals stay separated by currency.</p><div class="budget-summary">${Object.entries(byCur).map(([c,n])=>`<div class="budget-card"><small>Total in ${esc(c)}</small><strong>${esc(c)} ${money(n)}</strong></div>`).join('')||'<div class="budget-card">No expenses logged yet.</div>'}</div>${t.days.map((d,i)=>expenseDayHtml(d,i)).join('')}</section>`}
    function expenseDayHtml(d,i){const items=d.expenses||[];return `<article class="expense-day" data-day="${d.id}"><header class="expense-head"><div><h3>Day ${i} · ${esc(d.title)}</h3><small>${fmt(d.date)}</small></div><strong>${totals(items.map(x=>({cost:x.amount,currency:x.currency})))}</strong></header>${items.map(x=>{const linked=!!x.sourceType,lock=linked?'disabled':'';return `<div class="expense-row ${linked?'linked':''}" data-expense="${x.id}"><div class="field expense-description"><label>Description ${linked?'<small>(synced)</small>':''}</label><input data-field="description" value="${esc(x.description)}" placeholder="Dinner, taxi, tickets…" ${lock}></div><div class="field"><label>Category</label><select data-field="category" ${lock}>${CATEGORIES.map(c=>`<option ${x.category===c?'selected':''}>${c}</option>`).join('')}</select></div><div class="field"><label>Amount</label><input type="number" min="0" step="0.01" data-field="amount" value="${esc(x.amount)}" placeholder="0" ${lock}></div><div class="field"><label>Currency</label><input data-field="currency" value="${esc(x.currency||'PHP')}" maxlength="5" ${lock}></div>${linked?'<span title="Edit this from its source tab">🔗</span>':'<button class="btn small danger no-print" data-action="remove-expense" title="Remove expense">×</button>'}</div>`}).join('')||'<div class="expense-empty">No expenses for this day.</div>'}<footer class="expense-foot"><button class="btn small no-print" data-action="add-expense">＋ Add expense</button><span>${items.length} entr${items.length===1?'y':'ies'}</span></footer></article>`}
    function packingPanel(t){return `<section class="panel ${tab==='packing'?'active':''}" data-panel="packing"><h2>Packing checklist</h2><form class="form-row no-print" id="packForm"><div class="form-field"><label>New item</label><input id="packInput" required placeholder="Reusable water bottle"></div><button class="btn">Add item</button></form><ul class="packing-list">${t.packingList.map(x=>`<li class="packing-item ${x.checked?'checked':''}" data-item="${x.id}"><input type="checkbox" data-field="checked" ${x.checked?'checked':''}><input type="text" data-field="label" value="${esc(x.label)}"><button class="btn small danger no-print" data-action="remove-item">×</button></li>`).join('')}</ul></section>`}
    function changeTrip(mut,shouldRender=true){const id=Storage.active()?.id;Storage.mutate(s=>{const t=s.trips.find(x=>x.id===id);if(t)mut(t)});if(shouldRender)render()}
    function openTripModal(t){$('#modalTitle').textContent=t?'Edit journey':'Create a journey';$('#editTripId').value=t?.id||'';$('#tripName').value=t?.name||'';$('#tripDestination').value=t?.destination||'';$('#tripDescription').value=t?.description||'';$('#tripStart').value=t?.startDate||today();$('#tripEnd').value=t?.endDate||today();$('#tripModal').showModal()}
    $('#tripForm').addEventListener('submit',e=>{e.preventDefault();const id=$('#editTripId').value,name=$('#tripName').value.trim(),destination=$('#tripDestination').value.trim(),description=$('#tripDescription').value.trim(),start=$('#tripStart').value,end=$('#tripEnd').value;if(end<start){toast('End date must follow start date');return}Storage.mutate(s=>{if(id){const t=s.trips.find(t=>t.id===id);t.name=name;t.destination=destination;t.description=description;syncTripDates(t,start,end)}else{const t={id:uid(),name,destination,description,startDate:start,endDate:end,days:[],packingList:DEFAULT_PACK.map(label=>({id:uid(),label,checked:false}))};syncTripDates(t,start,end);s.trips.push(t);s.activeTripId=t.id}});$('#tripModal').close();render();toast(id?'Trip updated':'Trip created')});
    $('#cancelTrip').addEventListener('click',()=>$('#tripModal').close());
    function duplicateFullTrip(t){const copy=structuredClone(t),sourceIds=new Map();copy.id=uid();copy.name+=' (Copy)';copy.flights.forEach(r=>{const old=r.id;r.id=uid();sourceIds.set(`flight:${old}`,r.id)});copy.hotels.forEach(r=>{const old=r.id;r.id=uid();sourceIds.set(`hotel:${old}`,r.id)});copy.foodPlaces.forEach(r=>{const old=r.id;r.id=uid();sourceIds.set(`food:${old}`,r.id)});copy.days.forEach(d=>{d.id=uid();d.stops.forEach(x=>x.id=uid());d.expenses.forEach(x=>{x.id=uid();if(x.sourceType&&x.sourceId)x.sourceId=sourceIds.get(`${x.sourceType}:${x.sourceId}`)||x.sourceId})});copy.packingList.forEach(x=>x.id=uid());return copy}
    main.addEventListener('click',e=>{const a=e.target.closest('[data-action]');if(!a)return;const act=a.dataset.action;if(act==='toggle-nav'){e.stopImmediatePropagation();Storage.mutate(s=>s.ui.navCollapsed=!s.ui.navCollapsed);render();return}if(act==='duplicate'){e.stopImmediatePropagation();const t=Storage.active();Storage.mutate(s=>{const copy=duplicateFullTrip(t);s.trips.push(copy);s.activeTripId=copy.id});render();toast('Trip duplicated');return}if(act==='add-record'){e.stopImmediatePropagation();const type=a.dataset.recordType;changeTrip(t=>{const collection=recordCollection(t,type);collection.push(type==='flight'?{id:uid(),airline:'',flightNumber:'',origin:'',destination:'',departure:'',arrival:'',bookingRef:'',amount:'',currency:'PHP',notes:''}:type==='hotel'?{id:uid(),name:'',location:'',checkIn:'',checkOut:'',confirmation:'',amount:'',currency:'PHP',notes:''}:{id:uid(),venue:'',cuisine:'',location:'',visitDate:'',mealType:'',reservationTime:'',reservation:'',amount:'',currency:'PHP',notes:''})});return}if(act==='remove-record'){e.stopImmediatePropagation();const card=a.closest('[data-record]'),type=card.dataset.recordType,id=card.dataset.record;if(confirm('Remove this record and its linked expense?'))changeTrip(t=>{const collection=recordCollection(t,type),i=collection.findIndex(x=>x.id===id);if(i>=0)collection.splice(i,1);t.days.forEach(d=>d.expenses=d.expenses.filter(x=>!(x.sourceType===type&&x.sourceId===id)))});return}},true);
    main.addEventListener('click',e=>{const a=e.target.closest('[data-action]');if(!a)return;const t=Storage.active(),act=a.dataset.action,dayEl=a.closest('[data-day]'),stopEl=a.closest('[data-stop]'),expenseEl=a.closest('[data-expense]');if(act==='new')openTripModal();else if(act==='rename')openTripModal(t);else if(act==='duplicate'){Storage.mutate(s=>{const copy=structuredClone(t);copy.id=uid();copy.name+=' (Copy)';copy.days.forEach(d=>{d.id=uid();d.stops.forEach(x=>x.id=uid());(d.expenses||[]).forEach(x=>x.id=uid())});copy.packingList.forEach(x=>x.id=uid());s.trips.push(copy);s.activeTripId=copy.id});render();toast('Trip duplicated')}else if(act==='delete-trip'){if(confirm(`Delete “${t.name}”? This cannot be undone.`)){Storage.mutate(s=>{s.trips=s.trips.filter(x=>x.id!==t.id);s.activeTripId=s.trips[0]?.id||null});render()}}else if(act==='add-day'){changeTrip(t=>{const last=t.days.at(-1),date=last?new Date(last.date+'T00:00:00'):new Date(t.startDate+'T00:00:00');if(last)date.setDate(date.getDate()+1);t.days.push({id:uid(),date:date.toISOString().slice(0,10),title:'New day',stops:[],expenses:[]})})}else if(dayEl){changeTrip(t=>{const i=t.days.findIndex(x=>x.id===dayEl.dataset.day),d=t.days[i];d.expenses=d.expenses||[];if(act==='remove-day'){if(confirm('Remove this day and all its stops?'))t.days.splice(i,1)}else if(act==='day-up'&&i>0)[t.days[i-1],t.days[i]]=[t.days[i],t.days[i-1]];else if(act==='day-down'&&i<t.days.length-1)[t.days[i+1],t.days[i]]=[t.days[i],t.days[i+1]];else if(act==='add-stop')d.stops.push(blankStop());else if(act==='add-expense')d.expenses.push({id:uid(),description:'',category:'food',amount:'',currency:'PHP'});else if(act==='remove-expense')d.expenses=d.expenses.filter(x=>x.id!==expenseEl.dataset.expense);else if(stopEl){const j=d.stops.findIndex(x=>x.id===stopEl.dataset.stop);if(act==='remove-stop')d.stops.splice(j,1);else if(act==='stop-up'&&j>0)[d.stops[j-1],d.stops[j]]=[d.stops[j],d.stops[j-1]];else if(act==='stop-down'&&j<d.stops.length-1)[d.stops[j+1],d.stops[j]]=[d.stops[j],d.stops[j+1]]}})}else if(act==='remove-item'){changeTrip(t=>t.packingList=t.packingList.filter(x=>x.id!==a.closest('[data-item]').dataset.item))}else if(act==='png')exportPng(t)});
    main.addEventListener('click',e=>{const add=e.target.closest('[data-action="add-day"]');if(add){e.stopImmediatePropagation();changeTrip(t=>{const last=t.days.at(-1),date=last?parseDate(last.date):parseDate(t.startDate);if(last)date.setDate(date.getDate()+1);const value=localIso(date);t.days.push({id:uid(),date:value,title:'New day',stops:[],expenses:[]});t.endDate=value});return}const section=e.target.closest('.section-tab');if(section&&window.innerWidth<=900)Storage.mutate(s=>s.ui.navCollapsed=true)},true);
    function updateRecordField(e,rerender){const el=e.target,card=el.closest('[data-record]');if(!card)return;changeTrip(t=>{const type=card.dataset.recordType,r=recordCollection(t,type).find(x=>x.id===card.dataset.record);if(!r)return;r[el.dataset.recordField]=el.value;syncRecordExpense(t,type,r)},rerender)}
    main.addEventListener('input',e=>{if(e.target.matches('[data-record-field]'))updateRecordField(e,false)});main.addEventListener('change',e=>{if(e.target.matches('[data-record-field]'))updateRecordField(e,true)});
    main.addEventListener('change',updateField);main.addEventListener('input',e=>{if(e.target.matches('textarea,input[data-field],select[data-field]'))updateField(e,false)});function updateField(e,rerender=true){const el=e.target,field=el.dataset.field;if(!field)return;const day=el.closest('[data-day]'),stop=el.closest('[data-stop]'),item=el.closest('[data-item]'),expense=el.closest('[data-expense]');changeTrip(t=>{let obj;if(item)obj=t.packingList.find(x=>x.id===item.dataset.item);else{const d=t.days.find(x=>x.id===day.dataset.day);obj=expense?(d.expenses||[]).find(x=>x.id===expense.dataset.expense):stop?d.stops.find(x=>x.id===stop.dataset.stop):d}obj[field]=el.type==='checkbox'?el.checked:el.value},rerender)}
    main.addEventListener('submit',e=>{if(e.target.id==='packForm'){e.preventDefault();const v=$('#packInput').value.trim();if(v)changeTrip(t=>t.packingList.push({id:uid(),label:v,checked:false}))}});main.addEventListener('click',e=>{const x=e.target.closest('[data-tab]');if(x){tab=x.dataset.tab;render()}});list.addEventListener('click',e=>{const x=e.target.closest('[data-trip]');if(x){Storage.setActive(x.dataset.trip);render();$('.sidebar').classList.remove('open')}});$('#tripSearch').addEventListener('input',renderTrips);$('#newTrip').onclick=()=>openTripModal();$('.mobile-menu').onclick=()=>$('.sidebar').classList.toggle('open');
    $('#downloadBackup').onclick=()=>download(JSON.stringify({...Storage.read(),exportedAt:new Date().toISOString()},null,2),'lakbay-backup.json','application/json');$('#importBackup').onclick=()=>$('#backupFile').click();$('#backupFile').onchange=async e=>{try{const x=JSON.parse(await e.target.files[0].text());if(!x||!Array.isArray(x.trips))throw Error();if(confirm(`Import ${x.trips.length} trip(s)? This replaces current data.`)){Storage.write({trips:x.trips,activeTripId:x.activeTripId||x.trips[0]?.id||null});render();toast('Backup restored')}}catch{alert('That file is not a valid Lakbay backup.')}e.target.value=''};
    function download(data,name,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([data],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
    function exportPng(t){const days=t.days,h=190+days.reduce((n,d)=>n+90+d.stops.length*76,0),c=document.createElement('canvas');c.width=1200;c.height=Math.max(h,500);const x=c.getContext('2d');x.fillStyle='#f4ead5';x.fillRect(0,0,c.width,c.height);x.fillStyle='#174f4b';x.font='bold 54px Georgia';x.fillText(t.name,70,80);x.font='24px Georgia';x.fillText(`${t.destination}  •  ${fmt(t.startDate)} – ${fmt(t.endDate)}`,70,120);let y=175;days.forEach((d,i)=>{x.fillStyle='#b85f45';x.font='bold 27px Georgia';x.fillText(`DAY ${i+1}  —  ${d.title}`,70,y);y+=38;x.fillStyle='#586661';x.font='19px Georgia';x.fillText(fmt(d.date),70,y);y+=32;d.stops.forEach(s=>{x.fillStyle='#253735';x.font='bold 20px Georgia';x.fillText(`${s.time||'—'}   ${s.activity||'Untitled stop'}`,90,y);x.font='17px Georgia';x.fillText(`${s.location||''}${s.cost?`   •   ${s.currency} ${money(s.cost)}`:''}`,210,y+25);if(s.notes){x.fillStyle='#6f756e';x.fillText(s.notes.slice(0,90),210,y+48)}y+=76});y+=28});c.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=t.name.replace(/[^a-z0-9]+/gi,'-').toLowerCase()+'.png';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)})}
    render();
  })();
  </script>

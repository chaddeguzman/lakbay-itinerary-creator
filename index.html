<!doctype html>
<html lang="en">
  <head>
    <!-- Document metadata and global assets -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#174f4b" />
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <title>Lakbay Itinerary Creator</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- Mobile navigation and theme controls stay outside the app grid so they remain fixed. -->
    <button class="mobile-menu no-print" aria-label="Open trip menu">☰</button>

    <button
      class="theme-toggle no-print"
      id="themeToggle"
      type="button"
      aria-label="Toggle light/dark mode"
      title="Switch to dark theme"
      aria-pressed="false"
    >
      <span class="theme-toggle-track" aria-hidden="true">
        <span class="theme-toggle-thumb">
          <span class="theme-toggle-icon theme-toggle-icon--dark">🌙</span>
          <span class="theme-toggle-icon theme-toggle-icon--light">☀️</span>
        </span>
      </span>
    </button>

    <!-- Primary application shell -->
    <div class="app">
      <!-- Trip search, trip selection, and local data-management actions -->
      <aside class="sidebar no-print">
        <h1 class="brand">LAKBAY <span>✦</span></h1>
        <p class="tagline">Journeys, thoughtfully mapped.</p>

        <input
          class="search"
          id="tripSearch"
          placeholder="Search trips…"
          aria-label="Search trips"
        />

        <div class="trip-list" id="tripList"></div>

        <!-- Manage Data is collapsed by default; app.js toggles the nested actions. -->
        <div class="side-actions">
          <button class="btn" id="newTrip">＋ New trip</button>
          <button
            class="btn secondary manage-data-toggle"
            id="manageData"
            type="button"
            aria-expanded="false"
            aria-controls="dataActions"
          >
            Manage Data
          </button>
          <div class="data-actions" id="dataActions" hidden>
            <button class="btn secondary" id="importBackup" type="button">
              Import
            </button>
            <button class="btn secondary" id="downloadBackup" type="button">
              Export
            </button>
            <input
              type="file"
              id="backupFile"
              accept="application/json,.json"
              hidden
            />
          </div>
        </div>
      </aside>

      <!-- All trip panels are rendered into this container by scripts/app.js. -->
      <main class="main" id="main"></main>
    </div>

    <!-- Create/edit trip dialog -->
    <dialog class="modal" id="tripModal" aria-labelledby="modalTitle">
      <form method="dialog" class="modal-body" id="tripForm">
        <h2 id="modalTitle">Create a journey</h2>
        <input type="hidden" id="editTripId" />

        <div class="form-field">
          <label for="tripName">
            Trip name <span class="required">*</span>
          </label>
          <input
            id="tripName"
            required
            placeholder="Enter a name for this trip"
          />
        </div>

        <div class="form-field">
          <label for="tripDestination">
            Destination <span class="required">*</span>
          </label>
          <input
            id="tripDestination"
            required
            placeholder="Enter the trip destination"
          />
        </div>

        <div class="form-field">
          <label for="tripDescription">
            Description <span class="optional">(optional)</span>
          </label>
          <textarea
            id="tripDescription"
            rows="3"
            placeholder="What is this journey about?"
          ></textarea>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label for="tripStart">
              Start date <span class="required">*</span>
            </label>
            <input id="tripStart" type="date" required />
          </div>

          <div class="form-field">
            <label for="tripEnd">
              End date <span class="required">*</span>
            </label>
            <input id="tripEnd" type="date" required />
          </div>
        </div>

        <div class="modal-actions">
          <button class="btn secondary" type="button" id="cancelTrip">
            Cancel
          </button>
          <button class="btn" type="submit" id="saveTrip">Save trip</button>
        </div>
      </form>
    </dialog>

    <!-- Reusable two-stage confirmation dialog for activity and tour deletion -->
    <dialog
      class="modal delete-entry-modal"
      id="deleteEntryModal"
      aria-labelledby="deleteEntryTitle"
      aria-describedby="deleteEntryMessage"
    >
      <form method="dialog" class="modal-body delete-entry-body">
        <div class="delete-entry-stamp" aria-hidden="true">!</div>
        <p class="eyebrow" id="deleteEntryStep">Deletion warning</p>
        <h2 id="deleteEntryTitle">Remove activity?</h2>
        <p class="delete-entry-message" id="deleteEntryMessage"></p>

        <div class="modal-actions delete-entry-actions">
          <button
            class="btn small danger delete-entry-button"
            type="submit"
            value="cancel"
            title="Cancel deletion"
            aria-label="Cancel deletion"
          >
            ×
          </button>
          <button
            class="btn small save-activity delete-entry-button"
            id="confirmEntryDelete"
            type="submit"
            value="confirm"
            title="Continue"
            aria-label="Continue"
          >
            ✓
          </button>
        </div>
      </form>
    </dialog>

    <!-- Non-blocking status messages are announced by assistive technology. -->
    <div class="save-status no-print" id="saveStatus" role="status">Saved</div>
    <div class="toast" id="toast" role="status"></div>

    <!-- Floating Gemini-powered travel assistant -->
    <section class="travel-chat no-print" aria-label="Lakbay travel assistant">
      <div class="travel-chat-panel" id="travelChatPanel" hidden>
        <header class="travel-chat-header">
          <div>
            <strong>Lakbay TravelBot</strong>
            <small>Ask about your active trip</small>
          </div>
          <button
            class="travel-chat-close"
            id="travelChatClose"
            type="button"
            aria-label="Close travel assistant"
          >
            ×
          </button>
        </header>

        <div
          class="travel-chat-messages"
          id="travelChatMessages"
          role="log"
          aria-live="polite"
          aria-relevant="additions"
        >
          <div class="travel-chat-message bot-message">
            Hi! I’m Lakbay. Ask me for practical ideas about your active trip.
          </div>
        </div>

        <form class="travel-chat-form" id="travelChatForm">
          <label class="visually-hidden" for="travelChatInput">
            Message Lakbay TravelBot
          </label>
          <textarea
            id="travelChatInput"
            rows="2"
            maxlength="1200"
            placeholder="Ask about your trip"
            required
          ></textarea>
          <button class="travel-chat-send" type="submit">Send</button>
        </form>
        <small class="travel-chat-disclaimer">
          AI suggestions may need local verification.
        </small>
      </div>

      <button
        class="travel-chat-toggle"
        id="travelChatToggle"
        type="button"
        aria-label="Open Lakbay travel assistant"
        aria-controls="travelChatPanel"
        aria-expanded="false"
      >
        <span class="chat-dot" aria-hidden="true"></span>
        <span class="chat-dot" aria-hidden="true"></span>
        <span class="chat-dot" aria-hidden="true"></span>
      </button>
    </section>

    <!-- App logic is loaded last so every referenced DOM element already exists. -->
    <script src="gemini_travel_api.js"></script>
    <script type="module" src="scripts/app.js"></script>
  </body>
</html>
